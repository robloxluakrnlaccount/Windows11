<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windows 11</title>
<style>
@font-face {
  font-family: 'Segoe Fluent Icons';
  src: url('https://raw.githubusercontent.com/Smart-Space/TinUI/main/Segoe%20Fluent%20Icons.ttf') format('truetype');
}
@font-face {
  font-family: 'Segoe UI Light';
  src: url('https://raw.githubusercontent.com/lrqdo/osm-bright.tm2/master/fonts/Segoe%20UI-Light.ttf') format('truetype');
  font-weight: 300;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Segoe UI', 'Segoe UI Light', system-ui, sans-serif;
  background: #000;
}
/* Only non-input elements are unselectable */
body * { user-select: none; }
input, textarea { user-select: text; }

/* ── Desktop ── */
#desktop {
  position: fixed; inset: 0;
  background: url('https://blogs.windows.com/wp-content/uploads/sites/2/2021/10/Windows-11-Bloom-Screensaver-Dark-scaled.jpg') center/cover no-repeat;
}

/* ── Taskbar ── */
#taskbar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 48px;
  background: rgba(20,20,30,0.72);
  backdrop-filter: blur(40px) saturate(180%);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  border-top: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center;
  z-index: 10000;
  padding: 0 8px;
}

/* Left: Windows button */
.tb-left {
  display: flex; align-items: center; gap: 2px;
  flex-shrink: 0;
}

.tb-win-btn {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px; cursor: pointer;
  transition: background 0.1s;
  flex-shrink: 0;
}
.tb-win-btn:hover { background: rgba(255,255,255,0.1); }
.tb-win-btn:active { background: rgba(255,255,255,0.15); }
.tb-win-btn svg { width: 18px; height: 18px; }

/* Center: open windows */
.tb-center {
  flex: 1;
  display: flex; align-items: center;
  justify-content: center;
  gap: 2px;
  overflow: hidden;
  padding: 0 8px;
}

/* Taskbar app pill */
.tb-app {
  display: flex; align-items: center; justify-content: center;
  height: 40px;
  min-width: 40px; max-width: 160px;
  padding: 0 10px;
  border-radius: 6px;
  cursor: pointer;
  position: relative;
  transition: background 0.1s;
  gap: 6px;
  flex-shrink: 0;
}
.tb-app:hover { background: rgba(255,255,255,0.12); }
.tb-app.active { background: rgba(255,255,255,0.18); }
.tb-app.minimized { background: rgba(255,255,255,0.07); }

.tb-app-icon {
  font-family: 'Segoe Fluent Icons', sans-serif;
  font-size: 16px; color: #fff; line-height: 1;
  flex-shrink: 0;
}
.tb-app-title {
  font-size: 11.5px; color: rgba(255,255,255,0.88);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 100px;
}

/* Underline indicator */
.tb-app::after {
  content: '';
  position: absolute;
  bottom: 4px; left: 50%; transform: translateX(-50%);
  height: 3px; border-radius: 2px;
  background: #60cdff;
  transition: width 0.15s;
  width: 0;
}
.tb-app.active::after { width: 16px; }
.tb-app.minimized::after { width: 6px; background: rgba(255,255,255,0.5); }

/* + New window button */
#tb-new-btn {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px; cursor: pointer;
  color: rgba(255,255,255,0.6);
  font-size: 20px; font-weight: 300; line-height: 1;
  transition: background 0.1s, color 0.1s;
  flex-shrink: 0;
}
#tb-new-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
#tb-new-btn:active { background: rgba(255,255,255,0.16); }

/* Right: system tray */
.tb-right {
  display: flex; align-items: center; gap: 0;
  flex-shrink: 0; margin-left: auto;
}

.tray-icon {
  width: 32px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 4px; cursor: pointer;
  transition: background 0.1s;
}
.tray-icon:hover { background: rgba(255,255,255,0.1); }
.tray-icon span {
  font-family: 'Segoe Fluent Icons', sans-serif;
  font-size: 13px; color: rgba(255,255,255,0.88); line-height: 1;
}

.tray-clock {
  display: flex; flex-direction: column; align-items: flex-end;
  justify-content: center;
  padding: 0 8px 0 6px; height: 40px;
  cursor: pointer; border-radius: 4px;
  transition: background 0.1s;
}
.tray-clock:hover { background: rgba(255,255,255,0.1); }
.tray-time { font-size: 12px; color: rgba(255,255,255,0.92); line-height: 1.4; }
.tray-date { font-size: 11px; color: rgba(255,255,255,0.75); line-height: 1.4; }

/* ── Picker app styles (inside window iframe content) ── */
.papp {
  width: 100%; height: 100%;
  background: #f3f3f3;
  display: flex; flex-direction: column;
  font-family: 'Segoe UI', system-ui, sans-serif;
  overflow: hidden;
}
.papp-body {
  flex: 1; padding: 24px 28px;
  display: flex; flex-direction: column; gap: 18px;
  overflow-y: auto;
}
.papp-heading {
  font-size: 20px; font-weight: 300; color: #1a1a1a;
  font-family: 'Segoe UI Light', 'Segoe UI', sans-serif;
}
.papp-tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid #d0d0d0;
}
.papp-tab {
  padding: 8px 20px; font-size: 13px; color: #555;
  cursor: pointer; border-bottom: 2px solid transparent;
  margin-bottom: -1px; transition: color 0.1s, border-color 0.1s;
  user-select: none;
}
.papp-tab:hover { color: #111; }
.papp-tab.active { color: #0078d4; border-bottom-color: #0078d4; font-weight: 600; }
.papp-section { display: none; flex-direction: column; gap: 12px; }
.papp-section.active { display: flex; }
.papp-label { font-size: 12px; color: #666; }
.papp-filezone {
  border: 2px dashed #c0c0c0; border-radius: 8px;
  padding: 28px 20px; text-align: center;
  cursor: pointer; transition: border-color 0.15s, background 0.15s;
  background: #fff; position: relative;
}
.papp-filezone:hover { border-color: #0078d4; background: #f0f7ff; }
.papp-filezone.dragover { border-color: #0078d4; background: #e5f1ff; }
.papp-filezone-ico {
  font-family: 'Segoe Fluent Icons', sans-serif;
  font-size: 32px; color: #0078d4; display: block; margin-bottom: 8px;
}
.papp-filezone-text { font-size: 13px; color: #444; }
.papp-filezone-sub { font-size: 11px; color: #888; margin-top: 4px; }
.papp-filezone input[type=file] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.papp-selected {
  display: none; align-items: center; gap: 10px;
  background: #fff; border: 1px solid #d0d0d0;
  border-radius: 6px; padding: 10px 14px;
}
.papp-selected.show { display: flex; }
.papp-selected-ico { font-family: 'Segoe Fluent Icons', sans-serif; font-size: 20px; color: #0078d4; }
.papp-selected-name { font-size: 13px; color: #111; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.papp-selected-clear { font-size: 11px; color: #888; cursor: pointer; padding: 2px 6px; border-radius: 4px; }
.papp-selected-clear:hover { background: #eee; color: #c42b1c; }
.papp-urlinput {
  border: 1px solid #c0c0c0; border-radius: 6px;
  padding: 9px 12px; font-size: 13px; color: #111;
  outline: none; width: 100%;
  font-family: 'Segoe UI', sans-serif;
  transition: border-color 0.1s;
}
.papp-urlinput:focus { border-color: #0078d4; box-shadow: 0 0 0 2px rgba(0,120,212,0.15); }
.papp-footer {
  padding: 12px 28px 16px;
  border-top: 1px solid #ddd;
  display: flex; justify-content: flex-end; gap: 8px;
  background: #f3f3f3;
}
.papp-btn {
  padding: 6px 22px; border-radius: 4px; font-size: 13px;
  border: 1px solid transparent; cursor: pointer;
  font-family: 'Segoe UI', sans-serif;
  transition: background 0.1s;
}
.papp-btn.cancel { background: #fff; border-color: #c0c0c0; color: #111; }
.papp-btn.cancel:hover { background: #f0f0f0; }
.papp-btn.open { background: #0078d4; color: #fff; border-color: #0078d4; }
.papp-btn.open:hover { background: #106ebe; }
.picker-btn.cancel {
  background: rgba(255,255,255,0.1); color: #fff;
}
.picker-btn.cancel:hover { background: rgba(255,255,255,0.16); }
.picker-btn.open {
  background: #0078d4; color: #fff;
}
.picker-btn.open:hover { background: #1a8fe8; }

/* ── Windows ── */
.win11-window {
  position: fixed;
  min-width: 320px; min-height: 200px;
  background: #fff;
  border-radius: 8px;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.14), 0 8px 32px rgba(0,0,0,0.34), 0 32px 64px rgba(0,0,0,0.22);
  display: flex; flex-direction: column;
  overflow: visible;
  z-index: 1000;
}
.win11-window.focused { z-index: 1001; }
.win11-window.hidden { display: none; }

/* ── Titlebar ── */
.titlebar {
  height: 32px; min-height: 32px;
  background: #f3f3f3;
  display: flex; align-items: center;
  cursor: default;
  border-bottom: 1px solid #e0e0e0;
  border-radius: 8px 8px 0 0;
  position: relative; z-index: 10;
  overflow: visible; flex-shrink: 0;
}
.tb-app-ico {
  font-family: 'Segoe Fluent Icons', sans-serif;
  font-size: 14px; color: #005fb8;
  margin-left: 8px; margin-right: 2px;
  flex-shrink: 0; line-height: 1; pointer-events: none;
}
.tb-title-text {
  font-size: 12px; color: #1a1a1a; font-weight: 400;
  flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  padding: 0 8px; line-height: 32px; pointer-events: none;
}

/* Window control buttons */
.wctrl { display: flex; align-items: stretch; height: 32px; flex-shrink: 0; margin-left: auto; position: relative; overflow: visible; }
.wbtn {
  width: 46px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  background: transparent; border: none; cursor: pointer;
  position: relative; overflow: visible; flex-shrink: 0;
  transition: background 0.06s;
}
.wbtn:last-child { border-radius: 0 8px 0 0; }
.wbtn-ico {
  font-family: 'Segoe Fluent Icons', sans-serif;
  font-size: 10px; color: #1a1a1a; line-height: 1; pointer-events: none;
}
.wbtn:hover { background: rgba(0,0,0,0.08); }
.wbtn:active { background: rgba(0,0,0,0.14); }
.wbtn.wclose:hover { background: #c42b1c; }
.wbtn.wclose:hover .wbtn-ico { color: #fff; }
.wbtn.wclose:active { background: #b4261a; }

/* ── Snap flyout ── */
.snap-flyout {
  position: absolute; top: 100%; right: -8px;
  width: 300px;
  background: #1f1f1f;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 14px 12px 12px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.55);
  z-index: 99999;
  pointer-events: none;
  opacity: 0;
  transform: translateY(-6px) scale(0.97);
  transform-origin: top right;
  transition: opacity 0.14s ease, transform 0.14s ease;
}
.snap-flyout.visible { pointer-events: all; opacity: 1; transform: translateY(0) scale(1); }
.snap-flyout-lbl { font-size: 11.5px; color: #ccc; margin-bottom: 10px; }
.snap-grid { display: flex; flex-direction: column; gap: 5px; }
.snap-row-g { display: flex; gap: 5px; }
.snap-card {
  flex: 1; height: 52px;
  background: #2d2d2d; border-radius: 5px;
  border: 1.5px solid transparent; cursor: pointer;
  padding: 5px; display: flex; gap: 3px;
  overflow: hidden; transition: border-color 0.08s, background 0.08s;
}
.snap-card:hover { border-color: #0078d4; background: #353535; }
.sp { border-radius: 3px; background: #4a4a4a; flex-shrink: 0; transition: background 0.08s; }
.sp.hi { background: #0078d4; }
.snap-card:hover .sp.hi { background: #1a8fe8; }
.snap-card:hover .sp:not(.hi) { background: #555; }
.sp-col { display: flex; flex-direction: column; gap: 3px; flex: 1; }

/* ── Window content ── */
.wcontent {
  flex: 1; overflow: hidden; position: relative;
  border-radius: 0 0 8px 8px;
}
.wcontent iframe { width: 100%; height: 100%; border: none; display: block; }

/* ── Resize handles ── */
.rh { position: absolute; z-index: 20; }
.rh-n  { top:-4px;    left:8px;   right:8px;  height:8px;  cursor:n-resize; }
.rh-s  { bottom:-4px; left:8px;   right:8px;  height:8px;  cursor:s-resize; }
.rh-w  { left:-4px;   top:8px;    bottom:8px; width:8px;   cursor:w-resize; }
.rh-e  { right:-4px;  top:8px;    bottom:8px; width:8px;   cursor:e-resize; }
.rh-nw { top:-4px;    left:-4px;  width:14px; height:14px; cursor:nw-resize; }
.rh-ne { top:-4px;    right:-4px; width:14px; height:14px; cursor:ne-resize; }
.rh-sw { bottom:-4px; left:-4px;  width:14px; height:14px; cursor:sw-resize; }
.rh-se { bottom:-4px; right:-4px; width:14px; height:14px; cursor:se-resize; }

/* Blocker over iframes during drag/resize */
#blocker { display:none; position:fixed; inset:0; z-index:9998; cursor:inherit; }
body.busy #blocker { display:block; }

/* ── Desktop icon ── */
.desktop-icon {
  position: absolute;
  top: 20px; left: 20px;
  display: flex; flex-direction: column; align-items: center;
  gap: 4px; padding: 6px; border-radius: 6px;
  cursor: pointer; width: 72px;
  transition: background 0.1s;
}
.desktop-icon:hover { background: rgba(255,255,255,0.15); }
.desktop-icon:active { background: rgba(255,255,255,0.22); }
.desktop-icon-ico {
  font-family: 'Segoe Fluent Icons', sans-serif;
  font-size: 32px; color: #fff; line-height: 1;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
}
.desktop-icon-label {
  font-size: 11.5px; color: #fff; text-align: center;
  text-shadow: 0 1px 4px rgba(0,0,0,0.7);
  line-height: 1.3; word-break: break-word;
}
</style>
</head>
<body>

<div id="desktop">
  <!-- Desktop "Open App" icon -->
  <div class="desktop-icon" id="desktop-open-btn" title="Open HTML / Website">
    <span class="desktop-icon-ico">&#xE753;</span>
    <span class="desktop-icon-label">Open App</span>
  </div>
</div>

<!-- Blocker to keep drag/resize smooth over iframes -->
<div id="blocker"></div>

<!-- Taskbar -->
<div id="taskbar">
  <div class="tb-left">
    <!-- Windows logo -->
    <div class="tb-win-btn" id="tb-win-logo" title="Start">
      <svg viewBox="0 0 88 88" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 12.402l35.687-4.86.016 34.423-35.67.203zm35.67 33.529l.028 34.453L.028 75.48.026 45.7zm4.326-38.931L87.314 0v41.527l-47.318.376zm47.329 39.463l-.044 41.34-47.3-6.573-.066-34.82z" fill="#fff"/>
      </svg>
    </div>
  </div>

  <!-- Open windows list -->
  <div class="tb-center" id="tb-apps">
    <div id="tb-new-btn" title="Open new window">+</div>
  </div>

  <!-- System tray -->
  <div class="tb-right">
    <div class="tray-icon" id="tray-net" title="Network">
      <span id="net-icon">&#xE701;</span>
    </div>
    <div class="tray-icon" title="Volume">
      <span>&#xE767;</span>
    </div>
    <div class="tray-clock" id="tray-clock">
      <div class="tray-time" id="clock-time">12:00 PM</div>
      <div class="tray-date" id="clock-date">6/14/2026</div>
    </div>
  </div>
</div>



<script>
// ─────────────────────────────
// Clock
// ─────────────────────────────
function updateClock() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  document.getElementById('clock-time').textContent =
    h12 + ':' + String(m).padStart(2,'0') + ' ' + ampm;
  const d = now;
  document.getElementById('clock-date').textContent =
    (d.getMonth()+1) + '/' + d.getDate() + '/' + d.getFullYear();
}
updateClock();
setInterval(updateClock, 15000);

// ─────────────────────────────
// Network detection
// ─────────────────────────────
// E701 = WiFi, EB55 = no internet (globe with x), E774 = globe
// We'll use E701 (wifi) when online, E914 (offline/no signal) when offline
function updateNet() {
  const icon = document.getElementById('net-icon');
  const tray = document.getElementById('tray-net');
  if (navigator.onLine) {
    icon.textContent = '\uE701'; // WiFi
    tray.title = 'Connected';
  } else {
    icon.textContent = '\uEB55'; // No internet globe
    tray.title = 'No internet';
  }
}
updateNet();
window.addEventListener('online',  updateNet);
window.addEventListener('offline', updateNet);

// ─────────────────────────────
// Window manager
// ─────────────────────────────
let windows = [];
let nextId  = 1;
let drag    = null;
let resize  = null;
const MIN_W = 320, MIN_H = 200;
const TASKBAR_H = 48;

function clampTop(t) { return Math.max(0, Math.min(t, window.innerHeight - TASKBAR_H - 40)); }

function focusWindow(id) {
  windows.forEach(w => {
    w.el.classList.remove('focused');
    const pill = document.getElementById('tb-pill-' + w.id);
    if (pill) pill.classList.remove('active');
  });
  const win = windows.find(w => w.id === id);
  if (win) {
    win.el.classList.add('focused');
    const pill = document.getElementById('tb-pill-' + id);
    if (pill) { pill.classList.remove('minimized'); pill.classList.add('active'); }
  }
}

function createWindow(src, title, isUrl) {
  const id = nextId++;
  const vw = window.innerWidth, vh = window.innerHeight - TASKBAR_H;
  const w = Math.min(1000, vw * 0.88);
  const h = Math.min(660, vh * 0.9);
  const l = Math.round((vw - w) / 2) + (windows.length % 5) * 14;
  const t = Math.round((vh - h) / 2) + (windows.length % 5) * 14;

  const el = document.createElement('div');
  el.className = 'win11-window focused';
  el.id = 'win-' + id;
  el.style.cssText = `left:${l}px;top:${t}px;width:${w}px;height:${h}px;`;

  // Snap layout cards template
  const snapCardsHTML = `
    <div class="snap-flyout" id="snap-fly-${id}">
      <div class="snap-flyout-lbl">Snap layouts</div>
      <div class="snap-grid">
        <div class="snap-row-g">
          <div class="snap-card" data-wid="${id}" data-layout="full"><div class="sp hi" style="flex:1;height:100%;"></div></div>
          <div class="snap-card" data-wid="${id}" data-layout="left-half"><div class="sp hi" style="flex:1;height:100%;"></div><div class="sp" style="flex:1;height:100%;"></div></div>
          <div class="snap-card" data-wid="${id}" data-layout="right-half"><div class="sp" style="flex:1;height:100%;"></div><div class="sp hi" style="flex:1;height:100%;"></div></div>
          <div class="snap-card" data-wid="${id}" data-layout="left-2-3"><div class="sp hi" style="flex:2;height:100%;"></div><div class="sp" style="flex:1;height:100%;"></div></div>
        </div>
        <div class="snap-row-g">
          <div class="snap-card" data-wid="${id}" data-layout="right-2-3"><div class="sp" style="flex:1;height:100%;"></div><div class="sp hi" style="flex:2;height:100%;"></div></div>
          <div class="snap-card" data-wid="${id}" data-layout="left-third"><div class="sp hi" style="flex:1;height:100%;"></div><div class="sp" style="flex:1;height:100%;"></div><div class="sp" style="flex:1;height:100%;"></div></div>
          <div class="snap-card" data-wid="${id}" data-layout="center-third"><div class="sp" style="flex:1;height:100%;"></div><div class="sp hi" style="flex:1;height:100%;"></div><div class="sp" style="flex:1;height:100%;"></div></div>
          <div class="snap-card" data-wid="${id}" data-layout="right-third"><div class="sp" style="flex:1;height:100%;"></div><div class="sp" style="flex:1;height:100%;"></div><div class="sp hi" style="flex:1;height:100%;"></div></div>
        </div>
        <div class="snap-row-g">
          <div class="snap-card" data-wid="${id}" data-layout="quad-tl" style="display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:3px;padding:5px;"><div class="sp hi" style="border-radius:3px;"></div><div class="sp" style="border-radius:3px;"></div><div class="sp" style="border-radius:3px;"></div><div class="sp" style="border-radius:3px;"></div></div>
          <div class="snap-card" data-wid="${id}" data-layout="quad-tr" style="display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:3px;padding:5px;"><div class="sp" style="border-radius:3px;"></div><div class="sp hi" style="border-radius:3px;"></div><div class="sp" style="border-radius:3px;"></div><div class="sp" style="border-radius:3px;"></div></div>
          <div class="snap-card" data-wid="${id}" data-layout="quad-bl" style="display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:3px;padding:5px;"><div class="sp" style="border-radius:3px;"></div><div class="sp" style="border-radius:3px;"></div><div class="sp hi" style="border-radius:3px;"></div><div class="sp" style="border-radius:3px;"></div></div>
          <div class="snap-card" data-wid="${id}" data-layout="quad-br" style="display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:3px;padding:5px;"><div class="sp" style="border-radius:3px;"></div><div class="sp" style="border-radius:3px;"></div><div class="sp" style="border-radius:3px;"></div><div class="sp hi" style="border-radius:3px;"></div></div>
        </div>
      </div>
    </div>`;

  el.innerHTML = `
    <div class="rh rh-n" data-dir="n" data-wid="${id}"></div>
    <div class="rh rh-s" data-dir="s" data-wid="${id}"></div>
    <div class="rh rh-w" data-dir="w" data-wid="${id}"></div>
    <div class="rh rh-e" data-dir="e" data-wid="${id}"></div>
    <div class="rh rh-nw" data-dir="nw" data-wid="${id}"></div>
    <div class="rh rh-ne" data-dir="ne" data-wid="${id}"></div>
    <div class="rh rh-sw" data-dir="sw" data-wid="${id}"></div>
    <div class="rh rh-se" data-dir="se" data-wid="${id}"></div>
    <div class="titlebar" data-wid="${id}">
      <span class="tb-app-ico">&#xE774;</span>
      <span class="tb-title-text" id="wt-${id}">${title}</span>
      <div class="wctrl">
        <button class="wbtn wmin" data-wid="${id}" title="Minimize"><span class="wbtn-ico">&#xE921;</span></button>
        <button class="wbtn wmax" data-wid="${id}" title="Maximize">${snapCardsHTML}<span class="wbtn-ico" id="wmax-ico-${id}">&#xE922;</span></button>
        <button class="wbtn wclose" data-wid="${id}" title="Close"><span class="wbtn-ico">&#xE8BB;</span></button>
      </div>
    </div>
    <div class="wcontent">
      <iframe id="wframe-${id}" ${isUrl ? `src="${src}"` : ''} title="${title}" allowfullscreen></iframe>
    </div>`;

  document.getElementById('desktop').appendChild(el);

  // If file blob, set iframe src
  if (!isUrl && src) {
    document.getElementById('wframe-' + id).src = src;
  }

  // Try read title from iframe
  document.getElementById('wframe-' + id).addEventListener('load', () => {
    try {
      const t2 = document.getElementById('wframe-' + id).contentDocument?.title;
      if (t2) {
        document.getElementById('wt-' + id).textContent = t2;
        const pill = document.getElementById('tb-pill-' + id);
        if (pill) pill.querySelector('.tb-app-title').textContent = t2;
      }
    } catch(e) {}
  });

  const state = { id, el, isMaximized: false, preMax: null, isMinimized: false };
  windows.push(state);

  // Taskbar pill
  addTaskbarPill(id, title);
  focusWindow(id);

  // Animate in
  el.style.opacity = '0';
  el.style.transform = 'scale(0.96) translateY(8px)';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    el.style.transition = 'opacity 0.16s, transform 0.16s cubic-bezier(0.2,0,0,1)';
    el.style.opacity = '1';
    el.style.transform = 'none';
    setTimeout(() => { el.style.transition = ''; }, 180);
  }));

  // Snap flyout hover
  const snapBtn = el.querySelector('.wmax');
  const snapFly = document.getElementById('snap-fly-' + id);
  let flyT = null, flyHT = null;
  snapBtn.addEventListener('mouseenter', () => {
    clearTimeout(flyHT);
    flyT = setTimeout(() => snapFly.classList.add('visible'), 300);
  });
  snapBtn.addEventListener('mouseleave', () => {
    clearTimeout(flyT);
    flyHT = setTimeout(() => { if (!snapFly.matches(':hover')) snapFly.classList.remove('visible'); }, 120);
  });
  snapFly.addEventListener('mouseenter', () => { clearTimeout(flyT); clearTimeout(flyHT); });
  snapFly.addEventListener('mouseleave', () => { flyHT = setTimeout(() => snapFly.classList.remove('visible'), 80); });

  return state;
}

function addTaskbarPill(id, title) {
  const pill = document.createElement('div');
  pill.className = 'tb-app active';
  pill.id = 'tb-pill-' + id;
  pill.title = title;
  pill.innerHTML = `<span class="tb-app-icon">&#xE774;</span><span class="tb-app-title">${title}</span>`;
  pill.addEventListener('click', () => {
    const state = windows.find(w => w.id === id);
    if (!state) return;
    if (state.isMinimized) {
      unminimize(state);
    } else if (state.el.classList.contains('focused')) {
      minimize(state);
    } else {
      focusWindow(id);
    }
  });
  // Insert before the + button
  const newBtn = document.getElementById('tb-new-btn');
  document.getElementById('tb-apps').insertBefore(pill, newBtn);
}

// ─── Maximize / Restore ───
function getWinRect(el) {
  return { left: parseFloat(el.style.left), top: parseFloat(el.style.top),
           width: parseFloat(el.style.width), height: parseFloat(el.style.height) };
}
function applyRect(el, l, t, w, h, r, dur) {
  if (dur) {
    el.style.transition = `left ${dur}ms cubic-bezier(0.2,0,0,1),top ${dur}ms cubic-bezier(0.2,0,0,1),width ${dur}ms cubic-bezier(0.2,0,0,1),height ${dur}ms cubic-bezier(0.2,0,0,1),border-radius ${dur}ms`;
    setTimeout(() => el.style.transition = '', dur + 20);
  }
  el.style.left = l+'px'; el.style.top = t+'px';
  el.style.width = w+'px'; el.style.height = h+'px';
  el.style.borderRadius = r !== undefined ? r : '8px';
}

function maximize(state) {
  state.preMax = getWinRect(state.el);
  applyRect(state.el, 0, 0, window.innerWidth, window.innerHeight - TASKBAR_H, '0px', 160);
  document.getElementById('wmax-ico-' + state.id).textContent = '\uE923';
  state.isMaximized = true;
}
function restoreMax(state) {
  const r = state.preMax || { left:(window.innerWidth-1000)/2, top:(window.innerHeight-TASKBAR_H-660)/2, width:1000, height:660 };
  applyRect(state.el, r.left, r.top, r.width, r.height, '8px', 160);
  document.getElementById('wmax-ico-' + state.id).textContent = '\uE922';
  state.isMaximized = false;
}
function toggleMax(state) { if (state.isMaximized) restoreMax(state); else maximize(state); }

// Snap layouts
const SNAP_FNS = {
  'full':         () => [0, 0, window.innerWidth, window.innerHeight - TASKBAR_H, '0px'],
  'left-half':    () => [0, 0, window.innerWidth/2, window.innerHeight - TASKBAR_H, '8px'],
  'right-half':   () => [window.innerWidth/2, 0, window.innerWidth/2, window.innerHeight - TASKBAR_H, '8px'],
  'left-2-3':     () => [0, 0, window.innerWidth*(2/3), window.innerHeight - TASKBAR_H, '8px'],
  'right-2-3':    () => [window.innerWidth/3, 0, window.innerWidth*(2/3), window.innerHeight - TASKBAR_H, '8px'],
  'left-third':   () => [0, 0, window.innerWidth/3, window.innerHeight - TASKBAR_H, '8px'],
  'center-third': () => [window.innerWidth/3, 0, window.innerWidth/3, window.innerHeight - TASKBAR_H, '8px'],
  'right-third':  () => [window.innerWidth*(2/3), 0, window.innerWidth/3, window.innerHeight - TASKBAR_H, '8px'],
  'quad-tl':      () => [0, 0, window.innerWidth/2, (window.innerHeight - TASKBAR_H)/2, '8px'],
  'quad-tr':      () => [window.innerWidth/2, 0, window.innerWidth/2, (window.innerHeight - TASKBAR_H)/2, '8px'],
  'quad-bl':      () => [0, (window.innerHeight-TASKBAR_H)/2, window.innerWidth/2, (window.innerHeight-TASKBAR_H)/2, '8px'],
  'quad-br':      () => [window.innerWidth/2, (window.innerHeight-TASKBAR_H)/2, window.innerWidth/2, (window.innerHeight-TASKBAR_H)/2, '8px'],
};

// ─── Minimize ───
function minimize(state) {
  state.isMinimized = true;
  const pill = document.getElementById('tb-pill-' + state.id);
  if (pill) { pill.classList.remove('active'); pill.classList.add('minimized'); }
  state.el.style.transition = 'opacity 0.18s, transform 0.18s cubic-bezier(0.4,0,0.2,1)';
  state.el.style.opacity = '0';
  state.el.style.transform = 'translateY(30px) scaleY(0.7) scaleX(0.85)';
  state.el.style.transformOrigin = 'bottom center';
  setTimeout(() => {
    state.el.classList.add('hidden');
    state.el.style.transition = '';
    state.el.style.transform = '';
  }, 200);
}

function unminimize(state) {
  state.isMinimized = false;
  state.el.classList.remove('hidden');
  state.el.style.opacity = '0';
  state.el.style.transform = 'translateY(30px) scaleY(0.7) scaleX(0.85)';
  state.el.style.transformOrigin = 'bottom center';
  state.el.style.transition = '';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    state.el.style.transition = 'opacity 0.18s, transform 0.18s cubic-bezier(0.2,0,0,1)';
    state.el.style.opacity = '1';
    state.el.style.transform = 'none';
    setTimeout(() => { state.el.style.transition = ''; state.el.style.transform = ''; }, 200);
  }));
  focusWindow(state.id);
}

function closeWindow(id) {
  const idx = windows.findIndex(w => w.id === id);
  if (idx === -1) return;
  const state = windows[idx];
  state.el.style.transition = 'opacity 0.1s, transform 0.1s';
  state.el.style.opacity = '0';
  state.el.style.transform = 'scale(0.97)';
  setTimeout(() => {
    state.el.remove();
    const pill = document.getElementById('tb-pill-' + id);
    if (pill) pill.remove();
  }, 115);
  windows.splice(idx, 1);
  // Focus next window
  if (windows.length > 0) focusWindow(windows[windows.length-1].id);
}

// ─────────────────────────────
// Event delegation on desktop
// ─────────────────────────────
document.addEventListener('mousedown', (e) => {
  // Focus clicked window
  const winEl = e.target.closest('.win11-window');
  if (winEl) {
    const id = parseInt(winEl.id.replace('win-',''));
    if (!e.target.closest('.wbtn') && !e.target.closest('.snap-flyout') && !e.target.closest('.rh')) {
      focusWindow(id);
    }
  }

  // Titlebar drag
  if (e.target.closest('.titlebar') && !e.target.closest('.wctrl') && e.button === 0) {
    const tb = e.target.closest('.titlebar');
    const wid = parseInt(tb.dataset.wid);
    const state = windows.find(w => w.id === wid);
    if (state && !state.isMaximized) {
      const r = state.el.getBoundingClientRect();
      drag = { state, ox: e.clientX - r.left, oy: e.clientY - r.top };
      document.body.classList.add('busy');
      e.preventDefault();
    }
  }

  // Resize handles
  if (e.target.classList.contains('rh') && e.button === 0) {
    const wid = parseInt(e.target.dataset.wid);
    const state = windows.find(w => w.id === wid);
    if (state && !state.isMaximized) {
      const r = state.el.getBoundingClientRect();
      resize = { state, dir: e.target.dataset.dir, sx: e.clientX, sy: e.clientY, sl: r.left, st: r.top, sw: r.width, sh: r.height };
      document.body.classList.add('busy');
      e.preventDefault();
      e.stopPropagation();
    }
  }
});

document.addEventListener('click', (e) => {
  // Titlebar double-click
  if (e.detail === 2 && e.target.closest('.titlebar') && !e.target.closest('.wctrl')) {
    const wid = parseInt(e.target.closest('.titlebar').dataset.wid);
    const state = windows.find(w => w.id === wid);
    if (state) toggleMax(state);
  }

  // Maximize button
  if (e.target.closest('.wmax') && !e.target.closest('.snap-flyout')) {
    const wid = parseInt(e.target.closest('.wmax').dataset.wid);
    const state = windows.find(w => w.id === wid);
    if (state) toggleMax(state);
    e.stopPropagation();
  }

  // Minimize button
  if (e.target.closest('.wmin')) {
    const wid = parseInt(e.target.closest('.wmin').dataset.wid);
    const state = windows.find(w => w.id === wid);
    if (state) minimize(state);
    e.stopPropagation();
  }

  // Close button
  if (e.target.closest('.wclose')) {
    const wid = parseInt(e.target.closest('.wclose').dataset.wid);
    closeWindow(wid);
    e.stopPropagation();
  }

  // Snap card
  if (e.target.closest('.snap-card')) {
    const card = e.target.closest('.snap-card');
    const wid = parseInt(card.dataset.wid);
    const state = windows.find(w => w.id === wid);
    if (state) {
      const fn = SNAP_FNS[card.dataset.layout];
      if (fn) {
        state.preMax = getWinRect(state.el);
        const [l,t,w,h,r] = fn();
        applyRect(state.el, l, t, w, h, r, 160);
        state.isMaximized = (card.dataset.layout === 'full');
        document.getElementById('wmax-ico-' + wid).textContent = state.isMaximized ? '\uE923' : '\uE922';
        document.getElementById('snap-fly-' + wid).classList.remove('visible');
      }
    }
    e.stopPropagation();
  }
});

document.addEventListener('mousemove', (e) => {
  if (drag) {
    const { state, ox, oy } = drag;
    state.el.style.left = (e.clientX - ox) + 'px';
    state.el.style.top  = clampTop(e.clientY - oy) + 'px';
  }
  if (resize) {
    const { state, dir, sx, sy, sl, st, sw, sh } = resize;
    const dx = e.clientX - sx, dy = e.clientY - sy;
    let l = sl, t = st, w = sw, h = sh;
    if (dir.includes('e')) w = Math.max(MIN_W, sw + dx);
    if (dir.includes('s')) h = Math.max(MIN_H, sh + dy);
    if (dir.includes('w')) { const nw = Math.max(MIN_W, sw - dx); l = sl + sw - nw; w = nw; }
    if (dir.includes('n')) { const nh = Math.max(MIN_H, sh - dy); t = clampTop(st + sh - nh); h = nh; }
    state.el.style.left = l+'px'; state.el.style.top = t+'px';
    state.el.style.width = w+'px'; state.el.style.height = h+'px';
  }
});

document.addEventListener('mouseup', () => {
  drag = resize = null;
  document.body.classList.remove('busy');
});

// ─────────────────────────────
// Picker window app
// ─────────────────────────────
let pickerWinState = null;

function openPickerWindow() {
  // If already open, just focus it
  if (pickerWinState && windows.find(w => w.id === pickerWinState.id)) {
    if (pickerWinState.isMinimized) unminimize(pickerWinState);
    else focusWindow(pickerWinState.id);
    return;
  }

  const vw = window.innerWidth, vh = window.innerHeight - TASKBAR_H;
  const W = 480, H = 360;
  const l = Math.round((vw - W) / 2);
  const t = Math.round((vh - H) / 2);

  const id = nextId++;
  const el = document.createElement('div');
  el.className = 'win11-window focused';
  el.id = 'win-' + id;
  el.style.cssText = `left:${l}px;top:${t}px;width:${W}px;height:${H}px;`;

  el.innerHTML = `
    <div class="rh rh-n" data-dir="n" data-wid="${id}"></div>
    <div class="rh rh-s" data-dir="s" data-wid="${id}"></div>
    <div class="rh rh-w" data-dir="w" data-wid="${id}"></div>
    <div class="rh rh-e" data-dir="e" data-wid="${id}"></div>
    <div class="rh rh-nw" data-dir="nw" data-wid="${id}"></div>
    <div class="rh rh-ne" data-dir="ne" data-wid="${id}"></div>
    <div class="rh rh-sw" data-dir="sw" data-wid="${id}"></div>
    <div class="rh rh-se" data-dir="se" data-wid="${id}"></div>
    <div class="titlebar" data-wid="${id}">
      <span class="tb-app-ico">&#xED25;</span>
      <span class="tb-title-text">Open — Choose a file or URL</span>
      <div class="wctrl">
        <button class="wbtn wmin" data-wid="${id}" title="Minimize"><span class="wbtn-ico">&#xE921;</span></button>
        <button class="wbtn wmax" data-wid="${id}" title="Maximize">
          <div class="snap-flyout" id="snap-fly-${id}" style="display:none;"></div>
          <span class="wbtn-ico" id="wmax-ico-${id}">&#xE922;</span>
        </button>
        <button class="wbtn wclose" data-wid="${id}" title="Close"><span class="wbtn-ico">&#xE8BB;</span></button>
      </div>
    </div>
    <div class="wcontent" id="picker-wcontent-${id}" style="background:#f3f3f3; border-radius:0 0 8px 8px;">
      <div class="papp">
        <div class="papp-body">
          <div class="papp-heading">Open</div>
          <div class="papp-tabs">
            <div class="papp-tab active" data-ptab="file" data-pid="${id}">HTML File</div>
            <div class="papp-tab" data-ptab="url" data-pid="${id}">Website URL</div>
          </div>

          <div class="papp-section active" id="psec-file-${id}">
            <div class="papp-filezone" id="pzone-${id}">
              <span class="papp-filezone-ico">&#xED25;</span>
              <div class="papp-filezone-text">Click to browse or drag &amp; drop</div>
              <div class="papp-filezone-sub">.html, .htm files</div>
              <input type="file" id="pfile-${id}" accept=".html,.htm">
            </div>
            <div class="papp-selected" id="psel-${id}">
              <span class="papp-selected-ico">&#xED25;</span>
              <span class="papp-selected-name" id="psel-name-${id}"></span>
              <span class="papp-selected-clear" data-pid="${id}">✕ Clear</span>
            </div>
          </div>

          <div class="papp-section" id="psec-url-${id}">
            <div class="papp-label">Enter any website URL</div>
            <input class="papp-urlinput" id="purl-${id}" type="text" placeholder="https://example.com" spellcheck="false">
          </div>
        </div>

        <div class="papp-footer">
          <button class="papp-btn cancel" data-paction="cancel" data-pid="${id}">Cancel</button>
          <button class="papp-btn open" data-paction="open" data-pid="${id}">Open</button>
        </div>
      </div>
    </div>`;

  document.getElementById('desktop').appendChild(el);

  const state = { id, el, isMaximized: false, preMax: null, isMinimized: false };
  windows.push(state);
  pickerWinState = state;

  addTaskbarPill(id, 'Open');
  focusWindow(id);

  // Animate in
  el.style.opacity = '0';
  el.style.transform = 'scale(0.96) translateY(8px)';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    el.style.transition = 'opacity 0.16s, transform 0.16s cubic-bezier(0.2,0,0,1)';
    el.style.opacity = '1'; el.style.transform = 'none';
    setTimeout(() => { el.style.transition = ''; }, 180);
  }));

  // Wire up file input
  const fileInput = document.getElementById('pfile-' + id);
  const zone      = document.getElementById('pzone-' + id);
  const selBox    = document.getElementById('psel-' + id);
  const selName   = document.getElementById('psel-name-' + id);

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) {
      selName.textContent = fileInput.files[0].name;
      selBox.classList.add('show');
      zone.style.display = 'none';
    }
  });

  // Drag over zone
  zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', (e) => {
    e.preventDefault(); zone.classList.remove('dragover');
    const f = e.dataTransfer.files[0];
    if (f && (f.name.endsWith('.html') || f.name.endsWith('.htm'))) {
      // Manually assign to input via DataTransfer trick isn't possible; store ref
      zone._droppedFile = f;
      selName.textContent = f.name;
      selBox.classList.add('show');
      zone.style.display = 'none';
    }
  });
}

// Picker tab switching (delegated)
document.addEventListener('click', (e) => {
  // Picker tab
  if (e.target.dataset.ptab) {
    const pid = e.target.dataset.pid;
    const tab = e.target.dataset.ptab;
    el.querySelectorAll && void 0; // unused
    document.querySelectorAll(`[data-ptab][data-pid="${pid}"]`).forEach(t => t.classList.remove('active'));
    document.querySelectorAll(`.papp-section[id^="psec-"][id$="-${pid}"]`).forEach(s => s.classList.remove('active'));
    e.target.classList.add('active');
    document.getElementById(`psec-${tab}-${pid}`).classList.add('active');
    e.stopPropagation();
  }

  // Clear file
  if (e.target.dataset.pid && e.target.classList.contains('papp-selected-clear')) {
    const pid = e.target.dataset.pid;
    const zone = document.getElementById('pzone-' + pid);
    zone._droppedFile = null;
    document.getElementById('pfile-' + pid).value = '';
    document.getElementById('psel-' + pid).classList.remove('show');
    zone.style.display = '';
    e.stopPropagation();
  }

  // Cancel / Open buttons
  if (e.target.dataset.paction) {
    const pid = parseInt(e.target.dataset.pid);
    const action = e.target.dataset.paction;

    if (action === 'cancel') {
      closeWindow(pid);
      pickerWinState = null;
      e.stopPropagation();
      return;
    }

    if (action === 'open') {
      // Determine active tab
      const activeTabEl = document.querySelector(`[data-ptab].active[data-pid="${pid}"]`);
      const tab = activeTabEl ? activeTabEl.dataset.ptab : 'file';

      if (tab === 'file') {
        const zone = document.getElementById('pzone-' + pid);
        const fileEl = document.getElementById('pfile-' + pid);
        const file = zone._droppedFile || fileEl.files[0];
        if (!file) { fileEl.click(); return; }
        const src = URL.createObjectURL(file);
        closeWindow(pid);
        pickerWinState = null;
        createWindow(src, file.name, true);
      } else {
        let url = document.getElementById('purl-' + pid).value.trim();
        if (!url) { document.getElementById('purl-' + pid).focus(); return; }
        if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
        closeWindow(pid);
        pickerWinState = null;
        createWindow(url, url.replace(/^https?:\/\//,'').split('/')[0], true);
      }
      e.stopPropagation();
    }
  }
});

// Enter key in URL input
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && e.target.classList.contains('papp-urlinput')) {
    const pid = e.target.id.replace('purl-','');
    document.querySelector(`[data-paction="open"][data-pid="${pid}"]`)?.click();
  }
});

// ─────────────────────────────
// Open buttons
// ─────────────────────────────
document.getElementById('tb-new-btn').addEventListener('click', openPickerWindow);
document.getElementById('desktop-open-btn').addEventListener('click', openPickerWindow);
</script>
